<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>AI Document Chatbot</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="/css/style.css">
  </head>

  <body>
    <nav class="navbar border-bottom bg-body">
      <div class="container">
        <span class="navbar-brand fw-bold">
          AI Document Chatbot
        </span>

        <button
          id="themeButton"
          class="btn btn-outline-secondary btn-sm"
          type="button"
        >
          Dark Mode
        </button>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4">

        <div class="col-12 col-lg-4">
          <div class="card">
            <div class="card-body">
              <h1 class="h5">Upload Documents</h1>

              <p class="small text-body-secondary">
                Supported files: PDF, TXT, DOCX and CSV.
              </p>

              <input
                id="documentInput"
                class="form-control"
                type="file"
                accept=".pdf,.txt,.docx,.csv"
                multiple
              >

              <button
                id="uploadButton"
                class="btn btn-primary w-100 mt-3"
                type="button"
              >
                Upload
              </button>

              <div id="documentList" class="mt-3"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0">Chat</h2>

           <button id="clearChatButton"
                class="btn btn-outline-secondary btn-sm"
                 type="button"
            >
              Clear Chat
            </button>
          </div>

            <div id="chatMessages" class="card-body chat-messages">
              <div class="assistant-message">
                Upload a document and ask a question.
              </div>
            </div>
            <div id="loadingIndicator"
              class="px-3 pb-3 d-none"
            >
             <div class="spinner-border spinner-border-sm"
                  role="status"
             ></div>

             <span class="ms-2">
                Generating Response...
             </span>
            </div>

            <div class="card-footer">
              <form id="chatForm">
                <div class="input-group">
                  <input
                    id="questionInput"
                    class="form-control"
                    type="text"
                    placeholder="Ask a question..."
                  >
                  <button
                   id="sendButton"
                   class="btn btn-primary"
                    type="submit"
                  >
                   Send
                  </button>

                </div>
              </form>

              <div
                id="errorMessage"
                class="text-danger small mt-2"
              ></div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
